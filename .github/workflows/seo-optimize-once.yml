name: SEO Optimize Learn Articles (one-time)

on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Call optimize-learn API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://metalorix.com/api/seo/optimize-learn?secret=${CRON_SECRET}")
          body=$(echo "$response" | head -n -1)
          http_code=$(echo "$response" | tail -1)
          echo "HTTP: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::API returned $http_code"
            exit 1
          fi
