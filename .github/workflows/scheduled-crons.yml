name: Scheduled Cron Jobs

on:
  schedule:
    # Scrape prices every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - prices
          - content
          - glossary
          - news
          - alerts
          - learn
          - learn-priority
          - learn-translate
          - indexing
          - optimize-learn
          - optimize-titles
          - index-all
          - instagram
          - outlook
      content_type:
        description: 'When job=content: daily, evening, weekly, auto, translate, replace_today, regenerate_translations, fix_slugs'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - evening
          - weekly
          - auto
          - translate
          - replace_today
          - regenerate_translations
          - fix_slugs

env:
  SERVICE_URL: https://metalorix.com

jobs:
  scrape-prices:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'prices'
    runs-on: ubuntu-latest
    steps:
      - name: Scrape metal prices
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-prices")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Scrape prices failed with status $http_code"
            exit 1
          fi

  prepare-content:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'content' ||
      github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Scrape news (for content context)
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-news")
          echo "News: $(echo "$response" | tail -1)"
      - name: Scrape prices (ensure fresh data)
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-prices")
          echo "Prices: $(echo "$response" | tail -1)"

  generate-content:
    needs: [prepare-content]
    if: |
      always() && (needs.prepare-content.result == 'success' || needs.prepare-content.result == 'skipped') &&
      ((github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
       github.event.inputs.job == 'all' ||
       github.event.inputs.job == 'content')
    runs-on: ubuntu-latest
    steps:
      - name: Check if daily content should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          day_of_week=$(date -u +%u)
          # Manual trigger: always respect content_type input (fix_slugs, translate, etc.)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.content_type }}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=false" >> $GITHUB_OUTPUT
          # Saturday (6): skip daily + evening — markets closed, little news, avoids repetition
          elif [ "$day_of_week" = "6" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "run_event=false" >> $GITHUB_OUTPUT
          # Sunday (7): weekly at 18:00, evening at 19:00, skip rest
          elif [ "$day_of_week" = "7" ]; then
            if [ "$hour" = "18" ]; then
              echo "type=weekly" >> $GITHUB_OUTPUT
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "run_event=false" >> $GITHUB_OUTPUT
            elif [ "$hour" = "19" ] || ([ "$hour" = "20" ] && [ "$minute" -lt "30" ]); then
              echo "type=evening" >> $GITHUB_OUTPUT
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "run_event=true" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "run_event=false" >> $GITHUB_OUTPUT
            fi
          # Daily summary at 07:00 UTC (Mon–Fri). Full hour 07 + catch-up 08:00-08:29.
          elif [ "$hour" = "07" ] || ([ "$hour" = "08" ] && [ "$minute" -lt "30" ]); then
            echo "type=daily" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=true" >> $GITHUB_OUTPUT
          # Evening summary at 19:00 UTC (Mon–Fri). Friday = cierre de semana; Mon–Thu = cierre sesión.
          elif [ "$hour" = "19" ] || ([ "$hour" = "20" ] && [ "$minute" -lt "30" ]); then
            echo "type=evening" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "run_event=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate content
        if: steps.check.outputs.should_run == 'true'
        run: |
          url="${{ env.SERVICE_URL }}/api/cron/generate-content?type=${{ steps.check.outputs.type }}"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$url")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Generate content failed with status $http_code (503 = Gemini failed, minimal fallback rejected)"
            exit 1
          fi

      - name: Check for event articles (metal moves ≥5%, max 1/day)
        if: steps.check.outputs.run_event == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-content?type=event")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Event check Status: $http_code"
          echo "Event check Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::warning::Event article check failed (non-fatal)"
          fi

  verify-daily:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'content'
    runs-on: ubuntu-latest
    steps:
      - name: Check if verify should run (09:00 UTC, Mon–Fri only)
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          day_of_week=$(date -u +%u)
          # Skip verify on Saturday (6) and Sunday (7) — no daily expected
          if [ "$hour" = "09" ] && [ "$minute" -lt "15" ] && [ "$day_of_week" -lt "6" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify daily article exists (safety net)
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/verify-daily")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Verify Status: $http_code"
          echo "Verify Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Verify daily failed — daily article missing and auto-generate failed"
            exit 1
          fi

  check-alerts:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'alerts'
    runs-on: ubuntu-latest
    steps:
      - name: Check price alerts
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Run every hour (at minute 0-14) or on manual trigger
          if [ "$minute" -lt "15" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            response=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ env.SERVICE_URL }}/api/cron/check-alerts")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)
            echo "Status: $http_code"
            echo "Response: $body"
            if [ "$http_code" -ge 400 ]; then
              echo "::error::Check alerts failed with status $http_code"
              exit 1
            fi
          else
            echo "Skipping: not an hourly window"
          fi

  generate-glossary:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'glossary'
    runs-on: ubuntu-latest
    steps:
      - name: Check if glossary generation should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Generate glossary terms daily at 10:00 UTC (full hour to tolerate delays)
          if [ "$hour" = "10" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate glossary terms
        if: steps.check.outputs.should_run == 'true'
        run: |
          # Generate 5 new terms
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-glossary?action=generate&count=5")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Generate Status: $http_code"
          echo "Generate Response: $body"

          # Expand 3 existing terms
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-glossary?action=expand&count=3")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Expand Status: $http_code"
          echo "Expand Response: $body"

          # Translate 3 Spanish terms to en/zh/ar/tr/de
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-glossary?action=translate&count=3")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Translate Status: $http_code"
          echo "Translate Response: $body"

  generate-learn:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'learn'
    runs-on: ubuntu-latest
    steps:
      - name: Check if learn generation should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Generate learn articles at 08:00 and 16:00 UTC (full hour to tolerate delays)
          if [ "$hour" = "08" ] || [ "$hour" = "16" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate learn articles
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-content?type=learn")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

  learn-priority:
    if: github.event.inputs.job == 'learn-priority'
    runs-on: ubuntu-latest
    steps:
      - name: Force-regenerate near-miss and high-priority learn articles
        run: |
          # Near-miss articles from GSC: high impressions, position 6-9, low CTR → regenerate with improved prompt
          SLUGS="comparing-gold-etfs-in-europe,above-ground-gold-stock,coin-grading-ngc-and-pcgs,moving-averages-for-metals,cost-basis-tracking-for-metals,volatility-comparison-across-metals,liquidity-comparison-across-metals"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-content?type=learn&slugs=${SLUGS}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::learn-priority failed with status $http_code"
            exit 1
          fi

      - name: Optimize SEO titles for regenerated near-miss articles
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/optimize-titles?target=learn&limit=10")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Optimize Status: $http_code"
          echo "Optimize Response: $body"

  learn-translate:
    if: github.event.inputs.job == 'learn-translate'
    runs-on: ubuntu-latest
    steps:
      - name: Translate Learn articles to Hindi
        run: |
          total=0
          for i in {1..20}; do
            echo "Iteration $i..."
            response=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"action":"translate","locale":"hi","batchSize":25}' \
              "${{ env.SERVICE_URL }}/api/learn/generate")
            translated=$(echo "$response" | jq -r '.translated // 0')
            remaining=$(echo "$response" | jq -r '.remaining // 0')
            total=$((total + translated))
            echo "Translated: $translated, Remaining: $remaining"
            if [ "$remaining" = "0" ] || [ "$translated" = "0" ]; then
              break
            fi
            sleep 5
          done
          echo "Done. Total translated: $total"

  submit-indexing:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'indexing'
    runs-on: ubuntu-latest
    steps:
      - name: Check if indexing submission should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Submit to Google Indexing API once daily at 09:00 UTC
          if [ "$hour" = "09" ] && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit URLs to Google Indexing API
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/submit-indexing")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

  optimize-learn-titles:
    if: github.event.inputs.job == 'optimize-learn'
    runs-on: ubuntu-latest
    steps:
      - name: Optimize SEO titles for Learn articles (English)
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/optimize-titles?target=learn&limit=10")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::optimize-learn failed with status $http_code"
            exit 1
          fi

  optimize-titles:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'optimize-titles' ||
      github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Check if title optimization should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Run title optimization once daily at 10:00 UTC
          if [ "$hour" = "10" ] && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply manual title overrides (hand-crafted anti-zero-click titles)
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/optimize-titles?target=learn&slugs=manual")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Manual overrides status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::manual title overrides failed with status $http_code"
            exit 1
          fi
          sleep 5

      - name: Optimize generic news article titles with Gemini
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/optimize-titles?target=news&limit=5")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "News titles status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::optimize-titles (news) failed with status $http_code"
            exit 1
          fi

      - name: Optimize Learn article SEO titles with Gemini
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/optimize-titles?target=learn&limit=15")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Learn titles status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::optimize-titles (learn) failed with status $http_code"
            exit 1
          fi

      - name: Generate FAQ schema for learn articles without FAQ
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-faq?limit=15")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "FAQ generation status: $http_code"
          echo "Response: $body"

  index-all:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'index-all' ||
      github.event.inputs.job == 'indexing'
    runs-on: ubuntu-latest
    steps:
      - name: Check if bulk IndexNow should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          day_of_week=$(date -u +%u)
          # Run weekly on Monday at 07:00 UTC, or on manual trigger
          if [ "$day_of_week" = "1" ] && [ "$hour" = "07" ] && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit all URLs to IndexNow
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/seo/index-all")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::index-all failed with status $http_code"
            exit 1
          fi

  ping-sitemap:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Check if sitemap ping should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Ping search engines once daily at 06:00 UTC
          if [ "$hour" = "06" ] && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Ping search engines with sitemap
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/ping-sitemap")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

  scrape-news:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'news'
    runs-on: ubuntu-latest
    steps:
      - name: Check if news scraping should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Scrape news every 6 hours (at 07, 13, 18, 23 UTC) or on manual trigger
          if ([ "$hour" = "07" ] || [ "$hour" = "13" ] || [ "$hour" = "18" ] || [ "$hour" = "23" ]) && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Scrape news feeds
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-news")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

  instagram-post:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'instagram'
    runs-on: ubuntu-latest
    steps:
      - name: Check if Instagram post should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          day_of_week=$(date -u +%u)
          # Post daily at 09:30 UTC (11:30 CEST), skip Saturday (6)
          if [ "$day_of_week" = "6" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          elif [ "$hour" = "09" ] && [ "$minute" -ge "15" ] && [ "$minute" -lt "45" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Instagram post
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/instagram")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::Instagram post failed with status $http_code"
            exit 1
          fi

  generate-outlook:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'outlook'
    runs-on: ubuntu-latest
    steps:
      - name: Check if outlook generation should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Generate outlooks every 4 hours (at 02, 06, 10, 14, 18, 22 UTC)
          if ([ "$hour" = "02" ] || [ "$hour" = "06" ] || [ "$hour" = "10" ] || [ "$hour" = "14" ] || [ "$hour" = "18" ] || [ "$hour" = "22" ]) && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate metal outlooks
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-outlook")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::Generate outlook failed with status $http_code"
            exit 1
          fi
