name: Scheduled Cron Jobs

on:
  schedule:
    # Scrape prices every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - prices
          - content
          - glossary
          - news
          - alerts
          - learn
          - indexing
      content_type:
        description: 'When job=content: daily, evening, weekly, auto, translate, replace_today, or regenerate_translations'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - evening
          - weekly
          - auto
          - translate
          - replace_today
          - regenerate_translations

env:
  SERVICE_URL: https://metalorix.com

jobs:
  scrape-prices:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'prices'
    runs-on: ubuntu-latest
    steps:
      - name: Scrape metal prices
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-prices")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Scrape prices failed with status $http_code"
            exit 1
          fi

  prepare-content:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'content' ||
      github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Scrape news (for content context)
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-news")
          echo "News: $(echo "$response" | tail -1)"
      - name: Scrape prices (ensure fresh data)
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-prices")
          echo "Prices: $(echo "$response" | tail -1)"

  generate-content:
    needs: [prepare-content]
    if: |
      always() && (needs.prepare-content.result == 'success' || needs.prepare-content.result == 'skipped') &&
      ((github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
       github.event.inputs.job == 'all' ||
       github.event.inputs.job == 'content')
    runs-on: ubuntu-latest
    steps:
      - name: Check if daily content should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          day_of_week=$(date -u +%u)
          # Daily summary at 07:00 UTC (08:00 CET). Window 0-29 min to tolerate GitHub Actions delays.
          if [ "$hour" = "07" ] && [ "$minute" -lt "30" ]; then
            echo "type=daily" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=true" >> $GITHUB_OUTPUT
          # Evening summary at 19:00 UTC (20:00 CET, after US market close). Captures session moves.
          # Window: full hour (0-59) to tolerate GitHub Actions queue delays.
          elif [ "$hour" = "19" ]; then
            echo "type=evening" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=true" >> $GITHUB_OUTPUT
          # Weekly summary on Sunday at 18:00 UTC. Window 0-29 min for same reason.
          elif [ "$day_of_week" = "7" ] && [ "$hour" = "18" ] && [ "$minute" -lt "30" ]; then
            echo "type=weekly" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=true" >> $GITHUB_OUTPUT
          # Manual trigger (default daily to avoid Cloud Run timeout)
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.content_type }}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "run_event=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "run_event=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate content
        if: steps.check.outputs.should_run == 'true'
        run: |
          url="${{ env.SERVICE_URL }}/api/cron/generate-content?type=${{ steps.check.outputs.type }}"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$url")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Generate content failed with status $http_code (503 = Gemini failed, minimal fallback rejected)"
            exit 1
          fi

      - name: Check for event articles (metal moves ≥2%)
        if: steps.check.outputs.run_event == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-content?type=event")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Event check Status: $http_code"
          echo "Event check Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::warning::Event article check failed (non-fatal)"
          fi

  check-alerts:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'alerts'
    runs-on: ubuntu-latest
    steps:
      - name: Check price alerts
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Run every hour (at minute 0-14) or on manual trigger
          if [ "$minute" -lt "15" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            response=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ env.SERVICE_URL }}/api/cron/check-alerts")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)
            echo "Status: $http_code"
            echo "Response: $body"
            if [ "$http_code" -ge 400 ]; then
              echo "::error::Check alerts failed with status $http_code"
              exit 1
            fi
          else
            echo "Skipping: not an hourly window"
          fi

  generate-glossary:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'glossary'
    runs-on: ubuntu-latest
    steps:
      - name: Check if glossary generation should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Generate glossary terms daily at 10:00 UTC
          if [ "$hour" = "10" ] && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate glossary terms
        if: steps.check.outputs.should_run == 'true'
        run: |
          # Generate 5 new terms
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-glossary?action=generate&count=5")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Generate Status: $http_code"
          echo "Generate Response: $body"

          # Expand 3 existing terms
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-glossary?action=expand&count=3")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Expand Status: $http_code"
          echo "Expand Response: $body"

  generate-learn:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'learn'
    runs-on: ubuntu-latest
    steps:
      - name: Check if learn generation should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Generate learn articles at 08:00 and 16:00 UTC
          if ([ "$hour" = "08" ] || [ "$hour" = "16" ]) && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate learn articles
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/generate-content?type=learn")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

  submit-indexing:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'indexing'
    runs-on: ubuntu-latest
    steps:
      - name: Check if indexing submission should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Submit to Google Indexing API once daily at 09:00 UTC
          if [ "$hour" = "09" ] && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit URLs to Google Indexing API
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/submit-indexing")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

  scrape-news:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'news'
    runs-on: ubuntu-latest
    steps:
      - name: Check if news scraping should run
        id: check
        run: |
          hour=$(date -u +%H)
          minute=$(date -u +%M)
          # Scrape news every 6 hours (at 07, 13, 18, 23 UTC) or on manual trigger
          if ([ "$hour" = "07" ] || [ "$hour" = "13" ] || [ "$hour" = "18" ] || [ "$hour" = "23" ]) && [ "$minute" -lt "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Scrape news feeds
        if: steps.check.outputs.should_run == 'true'
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.SERVICE_URL }}/api/cron/scrape-news")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
