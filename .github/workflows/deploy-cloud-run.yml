name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE: metalorix
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/metalorix/app

jobs:
  migrate:
    runs-on: ubuntu-latest
    continue-on-error: true  # ECONNRESET with Cloud SQL Proxy is intermittent; deploy + smoke-test must run
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Start Cloud SQL Proxy
        run: |
          curl -sSfL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy ${{ secrets.GCP_PROJECT_ID }}:europe-west1:metalorix-db --port=5432 &
          sleep 25

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/metalorix
        run: |
          for i in 1 2 3 4 5 6; do
            npm run db:migrate && exit 0
            echo "Migration attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::warning::Migrations failed after 5 attempts (ECONNRESET). Deploy continues."
          exit 1

  deploy:
    needs: migrate
    # migrate can fail (ECONNRESET with Cloud SQL Proxy from GitHub); deploy continues
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3 \
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:europe-west1:metalorix-db \
            --set-env-vars "TWELVE_DATA_API_KEY=${{ secrets.TWELVE_DATA_API_KEY }},CRON_SECRET=${{ secrets.CRON_SECRET }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},NEXT_PUBLIC_URL=https://metalorix.com,DB_SOCKET_PATH=/cloudsql/${{ secrets.GCP_PROJECT_ID }}:europe-west1:metalorix-db,DB_NAME=metalorix,DB_USER=postgres,DB_PASSWORD=${{ secrets.DB_PASSWORD }},GOOGLE_INDEXING_KEY=${{ secrets.GOOGLE_INDEXING_KEY }},INDEXNOW_KEY=${{ secrets.INDEXNOW_KEY }},INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }},INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }},INSTAGRAM_IMAGE_SECRET=${{ secrets.INSTAGRAM_IMAGE_SECRET }}"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloud Run revision to stabilize
        run: sleep 30

      - name: Verify sitemap returns 200 with XML
        run: |
          STATUS=$(curl -s -o /tmp/sitemap.xml -w "%{http_code}" https://metalorix.com/api/sitemap)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Sitemap returned HTTP $STATUS (expected 200)"
            cat /tmp/sitemap.xml
            exit 1
          fi
          if ! grep -q '<sitemapindex\|<urlset' /tmp/sitemap.xml; then
            echo "::error::Sitemap response is not valid XML (missing <sitemapindex> or <urlset>)"
            head -20 /tmp/sitemap.xml
            exit 1
          fi
          echo "Sitemap index OK — HTTP $STATUS"
          SUB_STATUS=$(curl -s -o /tmp/sitemap-pages.xml -w "%{http_code}" "https://metalorix.com/api/sitemap?s=pages")
          if [ "$SUB_STATUS" != "200" ]; then
            echo "::error::Sitemap pages returned HTTP $SUB_STATUS"
            exit 1
          fi
          URL_COUNT=$(grep -c '<url>' /tmp/sitemap-pages.xml || true)
          echo "Sitemap pages OK — HTTP $SUB_STATUS, $URL_COUNT URLs"

      - name: Verify robots.txt returns 200
        run: |
          STATUS=$(curl -s -o /tmp/robots.txt -w "%{http_code}" https://metalorix.com/robots.txt)
          if [ "$STATUS" != "200" ]; then
            echo "::error::robots.txt returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          if ! grep -q 'Sitemap' /tmp/robots.txt; then
            echo "::error::robots.txt missing Sitemap declaration"
            cat /tmp/robots.txt
            exit 1
          fi
          echo "robots.txt OK — HTTP $STATUS"
          cat /tmp/robots.txt

      - name: Verify sitemap URL from robots.txt is reachable
        run: |
          SITEMAP_URL=$(grep -i '^Sitemap:' /tmp/robots.txt | head -1 | sed 's/^Sitemap:\s*//i' | tr -d ' \r')
          if [ -z "$SITEMAP_URL" ]; then
            echo "::error::No Sitemap URL found in robots.txt"
            exit 1
          fi
          echo "Sitemap URL from robots.txt: $SITEMAP_URL"
          STATUS=$(curl -sL -o /tmp/sitemap-from-robots.xml -w "%{http_code}" "$SITEMAP_URL")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Sitemap at declared URL returned HTTP $STATUS (expected 200)"
            head -50 /tmp/sitemap-from-robots.xml
            exit 1
          fi
          if ! grep -q '<sitemapindex\|<urlset' /tmp/sitemap-from-robots.xml; then
            echo "::error::Sitemap response is not valid XML (missing <sitemapindex> or <urlset>)"
            head -20 /tmp/sitemap-from-robots.xml
            exit 1
          fi
          echo "Sitemap URL from robots.txt OK — HTTP $STATUS, valid XML"

      - name: Verify homepage returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://metalorix.com/)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "308" ] && [ "$STATUS" != "307" ]; then
            echo "::error::Homepage returned HTTP $STATUS"
            exit 1
          fi
          echo "Homepage OK — HTTP $STATUS"

  lighthouse:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://metalorix.com/
            https://metalorix.com/precio/oro
            https://metalorix.com/herramientas
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
